services:
  mysql:
    image: mysql:8.0
    container_name: organic_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: organic_farm_docker
      MYSQL_USER: organic_user
      MYSQL_PASSWORD: organic_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: organic_backend
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: organic_farm_docker
      DB_USERNAME: organic_user
      DB_PASSWORD: organic_password

      SANCTUM_STATEFUL_DOMAINS: localhost:5173,127.0.0.1:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173

      QUEUE_CONNECTION: database
      CACHE_STORE: database
      FILESYSTEM_DISK: local
      MAIL_MAILER: log
    depends_on:
      - mysql
    command: >
      sh -c "
      composer install &&
      if [ ! -f .env ]; then cp .env.example .env; fi &&
      if ! grep -q '^APP_KEY=base64:' .env; then php artisan key:generate --force; fi &&
      php artisan optimize:clear &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: organic_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: organic_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - mysql

volumes:
  mysql_data:
  backend_vendor:
  frontend_node_modules: