services:
  database:
    image: mysql:8.0
    container_name: organic_database
    restart: unless-stopped
    env_file:
      - ./.env.mysql.production
    volumes:
      - organic_database_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: organic_backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./backend/.env.docker.production
    volumes:
      - ./backend/.env.docker.production:/var/www/html/.env:ro
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
      - ./backend/public:/var/www/html/public
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://iwthang.com
    container_name: organic_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - backend

volumes:
  organic_database_data: